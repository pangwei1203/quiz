<title>大家一起来刷题</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:16px}
header{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;padding:20px 24px;margin-bottom:16px;color:#fff}
header h1{font-size:20px;margin-bottom:4px}
header p{font-size:13px;opacity:.85}
/* 题库选择页面 */
.bank-select{max-width:600px;margin:0 auto;text-align:center}
.bank-select-header{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;padding:20px 24px;margin:16px;color:#fff;text-align:center}
.bank-select-header h1{font-size:20px;margin-bottom:4px;white-space:nowrap}
.bank-select-header p{font-size:13px;opacity:.85}
.bank-select h2{font-size:22px;color:#333;margin-bottom:8px}
.bank-select .subtitle{font-size:13px;color:#999;margin-bottom:32px}
.bank-card{display:block;background:#fff;border:2px solid #eee;border-radius:12px;padding:24px;cursor:pointer;transition:.2s;text-align:left;text-decoration:none;color:#333;margin-bottom:12px}
.bank-card:hover{border-color:#667eea;box-shadow:0 4px 16px rgba(102,126,234,.15)}
.bank-card .bank-icon{font-size:36px;margin-bottom:8px}
.bank-card .bank-name{font-size:17px;font-weight:600;margin-bottom:4px}
.bank-card .bank-desc{font-size:13px;color:#999}
#mainApp{display:none}
/* 题库信息栏 */
.bank-info-bar{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:10px;padding:10px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);font-size:13px}
.bank-info-bar .bank-label{color:#999}
.bank-info-bar .bank-name{color:#333;font-weight:600;margin-left:4px}
.bank-info-bar button{padding:6px 14px;border:1px solid #667eea;border-radius:6px;background:#fff;color:#667eea;font-size:12px;cursor:pointer;transition:.2s}
.bank-info-bar button:hover{background:#667eea;color:#fff}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stat-num{font-size:24px;font-weight:700;color:#667eea}
.stat-label{font-size:12px;color:#999;margin-top:2px}
.tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.tab{flex:1;min-width:80px;padding:10px;border:none;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;color:#666;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:.2s}
.tab.active{background:#667eea;color:#fff}
.tab .badge{display:inline-block;background:#ff4d4f;color:#fff;border-radius:10px;padding:0 6px;font-size:11px;margin-left:4px}
.content{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.08);min-height:300px}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar select,.filter-bar button{padding:8px 14px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;cursor:pointer}
.filter-bar button{background:#667eea;color:#fff;border:none}
.filter-bar button:hover{opacity:.85}
.question-card{border:1px solid #eee;border-radius:10px;padding:16px;margin-bottom:12px}
.q-header{display:flex;justify-content:space-between;margin-bottom:8px}
.q-num{font-weight:600;color:#667eea;font-size:14px}
.q-source{font-size:11px;color:#bbb}
.q-text{font-size:16px;line-height:1.6;margin-bottom:12px}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.option{display:flex;align-items:center;padding:10px 14px;border:2px solid #eee;border-radius:8px;cursor:pointer;transition:.2s;font-size:14px}
.option:hover{border-color:#c8d0ff}
.option.selected{border-color:#667eea;background:#f0f2ff}
.option.correct{border-color:#52c41a;background:#f6ffed}
.option.wrong{border-color:#ff4d4f;background:#fff2f0}
.option.disabled{pointer-events:none}
.option .letter{display:inline-flex;width:24px;height:24px;border-radius:50%;background:#f5f5f5;align-items:center;justify-content:center;margin-right:10px;font-weight:600;font-size:13px}
.option.correct .letter{background:#52c41a;color:#fff}
.option.wrong .letter{background:#ff4d4f;color:#fff}
.answer-section{background:#f9f9fb;border-radius:8px;padding:14px;margin-top:10px;display:none}
.answer-section.show{display:block}
.answer-tag{display:inline-block;background:#52c41a;color:#fff;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:600;margin-bottom:6px}
.explanation{font-size:14px;line-height:1.7;color:#555;margin-top:6px}
.nav-buttons{display:flex;justify-content:space-between;gap:10px;margin-top:16px}
.nav-buttons button{padding:10px 24px;border:none;border-radius:8px;font-size:14px;cursor:pointer;transition:.2s}
.btn-prev{background:#f5f5f5;color:#666}
.btn-next{background:#667eea;color:#fff}
.btn-submit{background:#52c41a;color:#fff;width:100%;padding:12px;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.btn-submit:hover{opacity:.9}
.btn-submit:disabled{background:#d9d9d9;cursor:not-allowed}
.hidden{display:none}
.result{border-radius:8px;padding:16px;margin-top:16px;display:none}
.result.show{display:block}
.result.pass{background:#f6ffed;border:1px solid #b7eb8f}
.result.fail{background:#fff2f0;border:1px solid #ffccc7}
.result h3{font-size:16px;margin-bottom:8px}
.result p{font-size:14px;color:#666}
.stat-detail{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.stat-item{text-align:center;padding:12px;background:#f9f9fb;border-radius:8px}
.stat-item .num{font-size:28px;font-weight:700;color:#667eea}
.stat-item .label{font-size:12px;color:#999;margin-top:4px}
.clear-btn{background:none;border:1px solid #ff4d4f;color:#ff4d4f;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;margin-top:8px}
.clear-btn:hover{background:#fff2f0}
.empty-msg{text-align:center;padding:40px 20px;color:#bbb;font-size:15px}
.wrong-list{max-height:500px;overflow-y:auto}
.wrong-progress{font-size:12px;color:#999;margin-bottom:6px}
.wrong-progress .done{color:#52c41a;font-weight:600}
.history-action{font-size:12px;color:#667eea;cursor:pointer;text-decoration:underline;margin-left:8px}
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px;padding:8px 0}
.pagination button{padding:6px 12px;border:none;border-radius:6px;font-size:13px;transition:.2s}
.pagination .page-num{font-size:13px;color:#666;padding:0 8px}

/* ============== Pad 适配 ============== */
@media (max-width:1024px) {
  .app{padding:12px}
  .bank-select-header{margin:12px;padding:16px 20px}
  .bank-select-header h1{font-size:18px}
  .content{padding:16px 18px}

  .app{padding:8px}
  .bank-select{margin:0 8px}
  .bank-select-header{margin:8px;padding:14px 16px;border-radius:8px}

  .bank-select-header p{font-size:12px}
  .bank-select h2{font-size:18px}
  .bank-select .subtitle{font-size:12px;margin-bottom:20px}
  .bank-card{padding:16px}
  .bank-card .bank-icon{font-size:28px}
  .bank-card .bank-name{font-size:15px}
  .bank-info-bar{padding:8px 10px;font-size:11px}
  .bank-info-bar button{padding:4px 10px;font-size:11px;white-space:nowrap}
  .stats-bar{grid-template-columns:repeat(2,1fr);gap:6px}
  .stat-card{padding:10px 6px}
  .stat-num{font-size:20px}
  .stat-label{font-size:11px}
  .tabs{gap:4px}
  .tab{flex:1;min-width:0;padding:8px 2px;font-size:11px;border-radius:6px}
  .tab .badge{font-size:10px;padding:0 4px;margin-left:2px}
  .content{padding:12px 14px;border-radius:8px}
  .filter-bar{gap:4px}
  .filter-bar select,.filter-bar button{padding:6px 10px;font-size:12px;white-space:nowrap}
  .question-card{padding:12px}
  .q-text{font-size:15px}
  .option{padding:8px 10px;font-size:13px}
  .option .letter{width:20px;height:20px;font-size:11px;margin-right:6px}
  .answer-section{padding:10px}
  .nav-buttons{gap:6px}
  .nav-buttons button{padding:8px 16px;font-size:13px}
  .btn-submit{padding:10px;font-size:15px}
  .stat-detail{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-item .num{font-size:22px}
  .result{padding:12px}
  .result h3{font-size:14px}
  .wrong-list{max-height:350px}
  .pagination button{padding:4px 10px;font-size:12px}
}

// ===================== 状态管理 =====================
const STORAGE_KEY = 'quiz_progress_0531';
let state = loadState();

function defaultState() {
    return {
        records: {},   // { qId: { answered: 'A', correct: true/false, timestamp: ms, wrongCorrectCount: 0 } }
        wrongActive: [],   // 活跃错题列表（需答对2次才能清除）
        wrongHistory: [],  // 历史错题列表（已答对2次被移入，可手动移回）
        quizMode: 'all',
        quizQuestions: [],
        quizIndex: 0,
        quizAnswers: {},
        quizDone: false,
        isWrongRetry: false,  // 当前是否处于错题重刷模式
        quizModeType: 'random',  // 'random' 或 'order'
    };
}

function loadState() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            const s = JSON.parse(raw);
            if (!s.wrongActive) s.wrongActive = [];
            if (!s.wrongHistory) s.wrongHistory = [];
            if (s.isWrongRetry === undefined) s.isWrongRetry = false;
            // 迁移旧数据：把 records 中 correct=false 的题加入 wrongActive（如果不在）
            Object.entries(s.records || {}).forEach(([id, rec]) => {
                if (rec.correct === false) {
                    const nId = parseInt(id);
                    if (!s.wrongActive.includes(nId) && !s.wrongHistory.includes(nId)) {
                        s.wrongActive.push(nId);
                    }
                    if (rec.wrongCorrectCount === undefined) rec.wrongCorrectCount = 0;
                }
            });
            return s;
        }
    } catch(e) {}
    return defaultState();
}

function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ===================== 工具 =====================
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function getGradeList() {
    const grades = {};
    ALL_QUESTIONS.forEach(q => {
        if (!grades[q.grade]) grades[q.grade] = 0;
        grades[q.grade]++;
    });
    const order = ['人工智能', '七年级上册', '七年级下册', '八年级上册'];
    return Object.entries(grades).sort((a,b) => {
        const ia = order.indexOf(a[0]), ib = order.indexOf(b[0]);
        if (ia >= 0 && ib >= 0) return ia - ib;
        if (ia >= 0) return -1;
        if (ib >= 0) return 1;
        return a[0].localeCompare(b[0]);
    });
}

function getQuestionsByGrade(grade) {
    if (!grade || grade === 'all') return ALL_QUESTIONS;
    return ALL_QUESTIONS.filter(q => q.grade === grade);
}

function getWrongIds() {
    return state.wrongActive;
}

function updateStats() {
    const records = Object.values(state.records);
    const total = ALL_QUESTIONS.length;
    const done = records.length;
    const correct = records.filter(r => r.correct === true).length;
    const wrong = state.wrongActive.length;
    const rate = done > 0 ? Math.round(correct / done * 100) : 0;
    
    // Header stats-bar 已移入统计页面，这里只更新错题角标
    const badge = document.getElementById('wrongBadge');
    if (wrong > 0) {
        badge.textContent = wrong;
        badge.classList.remove('hidden');
    } else {
        badge.classList.add('hidden');
    }
}

// ===================== 学习模式 =====================
function renderLearn() {
    const area = document.getElementById('contentArea');
    const grades = getGradeList();
    let html = `<div class="filter-bar">
        <select id="learnGrade"><option value="all">全部年级</option>`;
    grades.forEach(([g, c]) => {
        html += `<option value="${g}">${g} (${c}题)</option>`;
    });
    html += `</select>
        <select id="learnChapter"><option value="all">全部章节</option></select>
        <button onclick="filterLearn()">筛选</button>
    </div>
    <div id="learnList"></div>`;
    area.innerHTML = html;
    
    document.getElementById('learnGrade').addEventListener('change', updateChapterFilter);
    updateChapterFilter();
    filterLearn();
}

function updateChapterFilter() {
    const grade = document.getElementById('learnGrade').value;
    const sel = document.getElementById('learnChapter');
    const chapters = {};
    const qs = getQuestionsByGrade(grade);
    qs.forEach(q => {
        if (q.chapter && !chapters[q.chapter]) chapters[q.chapter] = 0;
        if (q.chapter) chapters[q.chapter]++;
    });
    sel.innerHTML = '<option value="all">全部章节</option>';
    Object.entries(chapters).sort().forEach(([ch, c]) => {
        sel.innerHTML += `<option value="${ch}">${ch} (${c}题)</option>`;
    });
}

const PAGE_SIZE = 30;
let learnPage = 0;
let learnQuestions = [];

function filterLearn() {
    const grade = document.getElementById('learnGrade').value;
    const chapter = document.getElementById('learnChapter').value;
    learnQuestions = getQuestionsByGrade(grade);
    if (chapter !== 'all') learnQuestions = learnQuestions.filter(q => q.chapter === chapter);
    learnPage = 0;
    renderLearnPage();
}

function renderLearnPage() {
    const list = document.getElementById('learnList');
    if (learnQuestions.length === 0) {
        list.innerHTML = '<div class="empty-msg">暂无题目</div>';
        return;
    }
    
    const total = learnQuestions.length;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    if (learnPage >= totalPages) learnPage = totalPages - 1;
    if (learnPage < 0) learnPage = 0;
    
    const start = learnPage * PAGE_SIZE;
    const end = Math.min(start + PAGE_SIZE, total);
    const pageQs = learnQuestions.slice(start, end);
    
    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:13px;color:#999">共 ${total} 题 · 第 ${start+1}-${end} 题</span></div>`;
    
    pageQs.forEach((q, idx) => {
        const rec = state.records[q.id];
        const statusColor = rec ? (rec.correct ? '✅' : '❌') : '📝';
        const num = start + idx + 1;
        html += `<div class="question-card">
            <div class="q-header">
                <span class="q-num">${statusColor} #${q.id}</span>
                <span class="q-source">${q.grade} · ${q.chapter}</span>
            </div>
            <div class="q-text">${num}. ${escapeHtml(q.question)}</div>`;
        
        if (q.options && q.options.length > 0) {
            html += `<div class="options">`;
            q.options.forEach(o => {
                const isCorrect = o.startsWith(q.answer + '.');
                html += `<div class="option disabled ${isCorrect ? 'correct' : ''}">
                    <span class="letter">${o[0]}</span> ${escapeHtml(o.substring(2))}
                </div>`;
            });
            html += `</div>`;
        }
        
        html += `<div class="answer-section show">
            <div><span class="answer-tag">答案：${q.answer || '未提供'}</span></div>`;
        if (q.explanation) {
            html += `<div class="explanation">${escapeHtml(q.explanation)}</div>`;
        }
        html += `</div></div>`;
    });
    
    // 分页按钮
    html += `<div style="display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px;padding:8px 0">`;
    html += `<button class="btn-prev" onclick="goLearnPage(0)" ${learnPage===0?'disabled':''} style="${learnPage===0?'opacity:.3;cursor:not-allowed':'cursor:pointer'}">⏮ 首页</button>`;
    html += `<button class="btn-prev" onclick="goLearnPage(${learnPage-1})" ${learnPage===0?'disabled':''} style="${learnPage===0?'opacity:.3;cursor:not-allowed':'cursor:pointer'}">← 上一页</button>`;
    html += `<span style="font-size:13px;color:#666;padding:0 8px">${learnPage+1}/${totalPages}</span>`;
    html += `<button class="btn-next" onclick="goLearnPage(${learnPage+1})" ${learnPage>=totalPages-1?'disabled':''} style="${learnPage>=totalPages-1?'opacity:.3;cursor:not-allowed':'cursor:pointer'}">下一页 →</button>`;
    html += `<button class="btn-next" onclick="goLearnPage(${totalPages-1})" ${learnPage>=totalPages-1?'disabled':''} style="${learnPage>=totalPages-1?'opacity:.3;cursor:not-allowed':'cursor:pointer'}">末页 ⏭</button>`;
    html += `</div>`;
    
    list.innerHTML = html;
}

function goLearnPage(page) {
    learnPage = page;
    renderLearnPage();
    document.getElementById('learnList').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===================== 刷题模式 =====================
function renderQuiz() {
    const area = document.getElementById('contentArea');
    const grades = getGradeList();
    let html = `<div class="filter-bar">
        <select id="quizGrade"><option value="all">全部年级</option>`;
    grades.forEach(([g, c]) => {
        html += `<option value="${g}">${g} (${c}题)</option>`;
    });
    html += `</select>
        <select id="quizCount">
            <option value="all" selected>全部</option>
            <option value="10">10题</option>
            <option value="30">30题</option>
            <option value="50">50题</option>
        </select>
        <select id="quizMode" style="min-width:90px">
            <option value="order" selected>📋 顺序</option>
            <option value="random">🎲 随机</option>
        </select>
        <button onclick="startQuiz()">开始刷题</button>
    </div>
    <div id="quizArea">
        <div class="empty-msg">👆 选择年级、题数和模式，点击「开始刷题」</div>
    </div>`;
    area.innerHTML = html;
}

function startQuiz() {
    const grade = document.getElementById('quizGrade').value;
    const countVal = document.getElementById('quizCount').value;
    const mode = document.getElementById('quizMode').value;
    let pool = getQuestionsByGrade(grade).filter(q => q.options && q.options.length > 0 && q.answer);
    
    if (mode === 'random') {
        pool = shuffle(pool);
    }
    // 顺序模式：保持原序（已按ID排列）
    if (countVal !== 'all') {
        pool = pool.slice(0, parseInt(countVal));
    }
    
    state.quizQuestions = pool.map(q => q.id);
    state.quizIndex = 0;
    state.quizAnswers = {};
    state.quizDone = false;
    state.isWrongRetry = false;
    state.quizModeType = mode;
    saveState();
    
    showQuizQuestion();
}

function showQuizQuestion() {
    const area = document.getElementById('quizArea');
    if (state.quizDone) {
        showQuizResult();
        return;
    }
    
    const qId = state.quizQuestions[state.quizIndex];
    if (!qId) {
        state.quizDone = true;
        saveState();
        showQuizResult();
        return;
    }
    
    const q = ALL_QUESTIONS.find(x => x.id === qId);
    if (!q) return;
    
    const selected = state.quizAnswers[qId] || '';
    const total = state.quizQuestions.length;
    const answered = Object.keys(state.quizAnswers).length;
    
    let modeLabel = '';
    if (state.isWrongRetry) {
        modeLabel = '<span style="color:#ff4d4f;font-weight:600">🔄 错题重刷</span> · ';
    } else if (state.quizModeType === 'order') {
        modeLabel = '<span style="color:#667eea;font-weight:600">📋 顺序刷题</span> · ';
    } else {
        modeLabel = '<span style="color:#667eea;font-weight:600">🎲 随机刷题</span> · ';
    }
    let html = `<div style="margin-bottom:12px;font-size:13px;color:#999">
        ${modeLabel}第 ${state.quizIndex + 1}/${total} 题 · 已答 ${answered}/${total}
        <div style="height:4px;background:#eee;border-radius:2px;margin-top:6px">
            <div style="height:4px;background:#667eea;border-radius:2px;width:${answered/total*100}%"></div>
        </div>
    </div>
    <div class="question-card">
        <div class="q-text">${state.quizIndex+1}. ${escapeHtml(q.question)}</div>
        <div class="options">`;
    
    q.options.forEach(o => {
        const letter = o[0];
        const cls = selected === letter ? 'selected' : '';
        html += `<div class="option ${cls}" onclick="selectQuizOption(${qId}, '${letter}')">
            <span class="letter">${letter}</span> ${escapeHtml(o.substring(2))}
        </div>`;
    });
    
    html += `</div>`;
    
    // Show answer if selected
    if (selected) {
        const isCorrect = selected === q.answer;
        let extraHtml = '';
        if (state.isWrongRetry && isCorrect) {
            const cc = (state.records[qId] && state.records[qId].wrongCorrectCount) || 0;
            extraHtml = `<div style="font-size:12px;color:#52c41a;margin-top:4px">✅ 已正确 ${cc}/2 次</div>`;
        }
        html += `<div class="answer-section show">
            <div><span class="answer-tag" style="background:${isCorrect ? '#52c41a' : '#ff4d4f'}">
                ${isCorrect ? '✅ 正确' : '❌ 错误'} · 正确答案：${q.answer}
            </span></div>${extraHtml}`;
        if (q.explanation) {
            html += `<div class="explanation">${escapeHtml(q.explanation)}</div>`;
        }
        html += `</div>`;
    }
    
    html += `</div>
    <div class="nav-buttons">`;
    if (state.quizIndex > 0) {
        html += `<button class="btn-prev" onclick="quizPrev()">← 上一题</button>`;
    } else {
        html += `<button class="btn-prev" disabled style="opacity:.3">← 上一题</button>`;
    }
    
    if (state.quizIndex < total - 1) {
        html += `<button class="btn-next" onclick="quizNext()">下一题 →</button>`;
    } else {
        html += `<button class="btn-submit" onclick="submitQuiz()" ${answered < total ? 'disabled' : ''}>
            ${answered < total ? `还剩 ${total - answered} 题未答` : '📊 查看成绩'}
        </button>`;
    }
    
    html += `</div>`;
    area.innerHTML = html;
    
    // Update option styles
    if (selected) {
        area.querySelectorAll('.option').forEach(el => {
            if (el.classList.contains('selected')) {
                const letter = el.textContent.trim()[0];
                if (letter === q.answer) {
                    el.classList.add('correct');
                } else {
                    el.classList.add('wrong');
                }
                el.classList.add('disabled');
            }
        });
    }
}

function selectQuizOption(qId, letter) {
    if (state.quizDone) return;
    const q = ALL_QUESTIONS.find(x => x.id === qId);
    if (!q) return;
    
    state.quizAnswers[qId] = letter;
    
    const isCorrect = letter === q.answer;
    
    if (state.isWrongRetry) {
        // 错题重刷模式：追踪正确次数
        if (!state.records[qId]) {
            state.records[qId] = { answered: letter, correct: isCorrect, timestamp: Date.now(), wrongCorrectCount: 0 };
        }
        if (isCorrect) {
            state.records[qId].wrongCorrectCount = (state.records[qId].wrongCorrectCount || 0) + 1;
            state.records[qId].correct = true;
            // 正确2次则移入历史错题
            if (state.records[qId].wrongCorrectCount >= 2) {
                state.wrongActive = state.wrongActive.filter(id => id !== qId);
                if (!state.wrongHistory.includes(qId)) {
                    state.wrongHistory.push(qId);
                }
            }
        } else {
            state.records[qId].wrongCorrectCount = 0;
            state.records[qId].correct = false;
            // 确保仍在 wrongActive 中
            if (!state.wrongActive.includes(qId)) {
                state.wrongActive.push(qId);
            }
        }
        state.records[qId].answered = letter;
        state.records[qId].timestamp = Date.now();
    } else {
        // 普通刷题模式
        state.records[qId] = { answered: letter, correct: isCorrect, timestamp: Date.now(), wrongCorrectCount: 0 };
        if (!isCorrect) {
            // 答错则加入错题本（如果不在任何列表中）
            if (!state.wrongActive.includes(qId) && !state.wrongHistory.includes(qId)) {
                state.wrongActive.push(qId);
            }
        }
    }
    
    saveState();
    updateStats();
    showQuizQuestion();
}

function quizNext() {
    if (state.quizIndex < state.quizQuestions.length - 1) {
        state.quizIndex++;
        saveState();
        showQuizQuestion();
    }
}

function quizPrev() {
    if (state.quizIndex > 0) {
        state.quizIndex--;
        saveState();
        showQuizQuestion();
    }
}

function submitQuiz() {
    state.quizDone = true;
    saveState();
    showQuizResult();
    updateStats();
}

function showQuizResult() {
    const area = document.getElementById('quizArea');
    const total = state.quizQuestions.length;
    const answered = Object.keys(state.quizAnswers).length;
    const correct = state.quizQuestions.filter(id => {
        const ans = state.quizAnswers[id];
        const q = ALL_QUESTIONS.find(x => x.id === id);
        return q && ans === q.answer;
    }).length;
    const wrong = answered - correct;
    const rate = answered > 0 ? Math.round(correct / answered * 100) : 0;
    const passed = rate >= 60;
    
    area.innerHTML = `
    <div class="result show ${passed ? 'pass' : 'fail'}">
        <h3>${passed ? '🎉 恭喜通过！' : '💪 继续加油！'}</h3>
        <div class="stat-detail">
            <div class="stat-item"><div class="num">${total}</div><div class="label">总题数</div></div>
            <div class="stat-item"><div class="num">${correct}</div><div class="label">正确</div></div>
            <div class="stat-item"><div class="num">${wrong}</div><div class="label">错误</div></div>
        </div>
        <p style="text-align:center;font-size:24px;font-weight:700;color:${passed ? '#52c41a' : '#ff4d4f'}">
            正确率 ${rate}% ${passed ? '✅' : '❌'}
        </p>
        <div style="text-align:center;margin-top:16px">
            <button class="btn-submit" style="width:auto;padding:10px 24px" onclick="${state.isWrongRetry ? 'retryWrong()' : 'startQuiz()'}">${state.isWrongRetry ? '🔄 再练一遍' : '再来一轮'}</button>
            <button class="clear-btn" style="margin-left:8px" onclick="showWrongInQuiz()">查看错题</button>
        </div>
    </div>
    <div id="quizReview" style="margin-top:16px">
        <h3 style="margin-bottom:12px;font-size:15px">题目回顾</h3>
    </div>`;
    
    const review = document.getElementById('quizReview');
    state.quizQuestions.forEach((id, idx) => {
        const q = ALL_QUESTIONS.find(x => x.id === id);
        const ans = state.quizAnswers[id];
        const isCorrect = q && ans === q.answer;
        if (!q) return;
        
        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
            <div class="q-header">
                <span class="q-num">${isCorrect ? '✅' : '❌'} #${idx+1}</span>
            </div>
            <div class="q-text">${escapeHtml(q.question)}</div>
            <div style="font-size:13px;color:#666">
                你的答案：<span style="color:${isCorrect ? '#52c41a' : '#ff4d4f'};font-weight:600">${ans || '未答'}</span>
                ${!isCorrect && q.answer ? ` · 正确答案：<span style="color:#52c41a;font-weight:600">${q.answer}</span>` : ''}
            </div>`;
        review.appendChild(div);
    });
}

function showWrongInQuiz() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-tab="wrong"]').classList.add('active');
    renderTab('wrong');
}

// ===================== 错题模式 =====================
function renderWrong() {
    const area = document.getElementById('contentArea');
    const wrongIds = state.wrongActive;
    
    if (wrongIds.length === 0) {
        area.innerHTML = `<div class="empty-msg">🎉 暂无错题，继续保持！</div>`;
        return;
    }
    
    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:14px;color:#666">共 ${wrongIds.length} 道错题待练</span>
        <button class="btn-submit" style="width:auto;padding:8px 16px;font-size:13px" onclick="retryWrong()">🎯 重刷错题</button>
    </div>
    <div class="wrong-list" id="wrongList"></div>`;
    area.innerHTML = html;
    
    const list = document.getElementById('wrongList');
    wrongIds.forEach((id, idx) => {
        const q = ALL_QUESTIONS.find(x => x.id === id);
        if (!q) return;
        const rec = state.records[id];
        const cc = rec ? (rec.wrongCorrectCount || 0) : 0;
        const progressText = cc > 0 ? `已正确 <span class="done">${cc}/2</span> 次` : '尚未正确作答';
        
        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
            <div class="q-header">
                <span class="q-num">❌ #${idx+1}</span>
                <span class="q-source">${q.grade} · ${q.chapter}</span>
            </div>
            <div class="q-text">${escapeHtml(q.question)}</div>
            <div class="wrong-progress">${progressText}</div>
            <div style="font-size:13px;color:#666;margin-bottom:8px">
                你的答案：<span style="color:#ff4d4f;font-weight:600">${rec ? rec.answered : '未答'}</span>
                ${q.answer ? ` · 正确答案：<span style="color:#52c41a;font-weight:600">${q.answer}</span>` : ''}
            </div>
            ${q.explanation ? `<div class="answer-section show"><div class="explanation">${escapeHtml(q.explanation)}</div></div>` : ''}
        `;
        list.appendChild(div);
    });
}

function retryWrong() {
    const wrongIds = state.wrongActive;
    if (wrongIds.length === 0) return;
    
    const pool = wrongIds.filter(id => {
        const q = ALL_QUESTIONS.find(x => x.id === id);
        return q && q.options && q.options.length > 0 && q.answer;
    });
    
    state.quizQuestions = shuffle(pool);
    state.quizIndex = 0;
    state.quizAnswers = {};
    state.quizDone = false;
    state.isWrongRetry = true;
    saveState();
    
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-tab="quiz"]').classList.add('active');
    renderTab('quiz');
    showQuizQuestion();
}

// ===================== 历史错题模式 =====================
function renderHistory() {
    const area = document.getElementById('contentArea');
    const historyIds = state.wrongHistory;
    
    if (historyIds.length === 0) {
        area.innerHTML = `<div class="empty-msg">📋 暂无历史错题。<br><span style="font-size:13px;color:#bbb">在错题重刷中答对2次的题目会自动移入此处</span></div>`;
        return;
    }
    
    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:14px;color:#666">共 ${historyIds.length} 道历史错题（已答对2次）</span>
        <button class="clear-btn" style="border-color:#667eea;color:#667eea" onclick="clearHistory()">清空历史</button>
    </div>`;
    
    // 一键移回错题本按钮
    html += `<div style="margin-bottom:12px">
        <button class="btn-next" onclick="moveAllBackToWrong()">⬅ 全部移回错题本重练</button>
    </div>
    <div class="wrong-list" id="historyList"></div>`;
    area.innerHTML = html;
    
    const list = document.getElementById('historyList');
    historyIds.forEach((id, idx) => {
        const q = ALL_QUESTIONS.find(x => x.id === id);
        if (!q) return;
        const rec = state.records[id];
        
        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
            <div class="q-header">
                <span class="q-num">📋 #${idx+1}</span>
                <span class="q-source">${q.grade} · ${q.chapter}</span>
            </div>
            <div class="q-text">${escapeHtml(q.question)}</div>
            <div style="font-size:13px;color:#999;margin-bottom:8px">
                ✅ 已答对2次移入历史
                ${rec ? ` · 上次答案：<span style="color:#52c41a">${rec.answered}</span>` : ''}
                <span class="history-action" onclick="moveBackToWrong(${id})">移回错题本</span>
            </div>
            ${q.explanation ? `<div class="answer-section show"><div class="explanation">${escapeHtml(q.explanation)}</div></div>` : ''}
        `;
        list.appendChild(div);
    });
}

function moveBackToWrong(qId) {
    state.wrongHistory = state.wrongHistory.filter(id => id !== qId);
    if (!state.wrongActive.includes(qId)) {
        state.wrongActive.push(qId);
    }
    // 重置正确计数
    if (state.records[qId]) {
        state.records[qId].wrongCorrectCount = 0;
    }
    saveState();
    updateStats();
    renderHistory();
}

function moveAllBackToWrong() {
    if (state.wrongHistory.length === 0) return;
    if (!confirm(`确定将 ${state.wrongHistory.length} 道历史错题全部移回错题本？`)) return;
    state.wrongHistory.forEach(id => {
        if (!state.wrongActive.includes(id)) {
            state.wrongActive.push(id);
        }
        if (state.records[id]) {
            state.records[id].wrongCorrectCount = 0;
        }
    });
    state.wrongHistory = [];
    saveState();
    updateStats();
    renderHistory();
}

function clearHistory() {
    if (!confirm('确定清空所有历史错题？')) return;
    state.wrongHistory = [];
    saveState();
    updateStats();
    renderHistory();
}

// ===================== 统计模式 =====================
function renderStats() {
    const area = document.getElementById('contentArea');
    const records = Object.values(state.records);
    const done = records.length;
    const correct = records.filter(r => r.correct === true).length;
    const wrong = records.filter(r => r.correct === false).length;
    const rate = done > 0 ? Math.round(correct / done * 100) : 0;
    
    // By grade
    const byGrade = {};
    ALL_QUESTIONS.forEach(q => {
        if (!byGrade[q.grade]) byGrade[q.grade] = { total: 0, done: 0, correct: 0 };
        byGrade[q.grade].total++;
        if (state.records[q.id]) {
            byGrade[q.grade].done++;
            if (state.records[q.id].correct) byGrade[q.grade].correct++;
        }
    });
    
    let html = `<div class="stats-bar">
        <div class="stat-card"><div class="stat-num">${ALL_QUESTIONS.length}</div><div class="stat-label">总题数</div></div>
        <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">已练习</div></div>
        <div class="stat-card"><div class="stat-num">${rate}%</div><div class="stat-label">正确率</div></div>
        <div class="stat-card"><div class="stat-num">${wrong}</div><div class="stat-label">错题数</div></div>
    </div>
    <h3 style="font-size:14px;margin-bottom:10px">各年级统计</h3>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
        <tr style="background:#f5f5f5">
            <th style="padding:8px;text-align:left">年级</th>
            <th style="padding:8px">总题</th>
            <th style="padding:8px">已练</th>
            <th style="padding:8px">正确</th>
            <th style="padding:8px">正确率</th>
        </tr>`;
    
    Object.entries(byGrade).sort((a,b) => {
        const order = ['人工智能', '七年级上册', '七年级下册', '八年级上册'];
        const ia = order.indexOf(a[0]), ib = order.indexOf(b[0]);
        if (ia >= 0 && ib >= 0) return ia - ib;
        if (ia >= 0) return -1;
        if (ib >= 0) return 1;
        return a[0].localeCompare(b[0]);
    }).forEach(([g, d]) => {
        const gr = d.done > 0 ? Math.round(d.correct / d.done * 100) : 0;
        html += `<tr style="border-bottom:1px solid #eee">
            <td style="padding:8px">${g}</td>
            <td style="padding:8px;text-align:center">${d.total}</td>
            <td style="padding:8px;text-align:center">${d.done}</td>
            <td style="padding:8px;text-align:center">${d.correct}</td>
            <td style="padding:8px;text-align:center"><span style="color:${gr >= 60 ? '#52c41a' : '#ff4d4f'};font-weight:600">${gr}%</span></td>
        </tr>`;
    });
    
    html += `</table>
    <h3 style="font-size:14px;margin:16px 0 10px">错题管理</h3>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
        <div style="padding:12px;background:#fff2f0;border-radius:8px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:#ff4d4f">${state.wrongActive.length}</div>
            <div style="font-size:12px;color:#666">活跃错题（待练）</div>
        </div>
        <div style="padding:12px;background:#f0f2ff;border-radius:8px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:#667eea">${state.wrongHistory.length}</div>
            <div style="font-size:12px;color:#666">历史错题（已清除）</div>
        </div>
    </div>
    <div style="text-align:center;margin-top:16px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap">
        <button class="btn-next" onclick="exportProgress()" style="border:none;border-radius:8px;padding:10px 24px;font-size:15px;cursor:pointer">📥 导出进度</button>
        <button class="btn-next" onclick="document.getElementById('importFile').click()" style="background:#52c41a;border:none;border-radius:8px;padding:10px 24px;font-size:15px;cursor:pointer">📤 导入进度</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProgress(event)">
        <button class="btn-next" onclick="clearAllRecords()" style="background:#ff4d4f;border:none;border-radius:8px;padding:10px 24px;font-size:15px;cursor:pointer">🗑 清除全部记录</button>
    </div>`;
    area.innerHTML = html;
}

function clearAllRecords() {
    if (!confirm('确定清除所有练习记录？此操作不可撤销。')) return;
    state.records = {};
    state.wrongActive = [];
    state.wrongHistory = [];
    saveState();
    updateStats();
    renderStats();
}

function exportProgress() {
    const data = {
        version: 1,
        totalQuestions: ALL_QUESTIONS.length,
        exportedAt: new Date().toISOString(),
        state: state
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `quiz-progress-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

function importProgress(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.state || !data.state.records) {
                alert('无效的进度文件格式');
                return;
            }
            if (!confirm(`导入后将覆盖当前进度。\n文件导出时间：${data.exportedAt || '未知'}\n题库题数：${data.totalQuestions || '?'}\n\n确定导入？`)) return;
            
            // 只导入进度数据，不覆盖题库
            state.records = data.state.records || {};
            state.wrongActive = data.state.wrongActive || [];
            state.wrongHistory = data.state.wrongHistory || [];
            state.isWrongRetry = false;
            state.quizDone = false;
            saveState();
            updateStats();
            renderStats();
            alert('进度导入成功！');
        } catch(err) {
            alert('导入失败：' + err.message);
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

// ===================== 初始化 =====================
// 页面加载时显示题库选择页，选择后由 selectBank() 启动主应用
</script>
